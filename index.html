<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Cumpleaños Belencita</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff9ad5, #ffd6f6, #ffc3a0);
    background-attachment: fixed;
    text-align: center;
    overflow-x: hidden;
}

/* Contenedor principal */
.container {
    padding-top: 15vh;
}

/* Título */
h1 {
    font-size: 3em;
    color: white;
    text-shadow: 2px 2px 15px rgba(0,0,0,0.3);
    animation: glow 2s infinite alternate;
}

/* Texto */
p {
    font-size: 1.4em;
    color: white;
    margin: 15px;
}

/* Botón */
button {
    margin-top: 20px;
    padding: 15px 30px;
    font-size: 1.2em;
    border: none;
    border-radius: 30px;
    background-color: #ff4da6;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background-color: #ff1a8c;
    transform: scale(1.1);
}

/* Animación brillo título */
@keyframes glow {
    from { text-shadow: 0 0 10px #fff; }
    to { text-shadow: 0 0 25px #ff4da6; }
}

/* Corazones */
.heart {
    position: fixed;
    bottom: -10px;
    color: white;
    font-size: 20px;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% {
        transform: translateY(0);
        opacity: 1;
    }
    100% {
        transform: translateY(-110vh);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>🎉 Feliz Cumpleaños Belencita 🎉</h1>
    <p>Hoy es un día súper especial porque celebramos tu vida 💖✨</p>
    <p>Que este año esté lleno de amor, alegría y sueños cumplidos 🎂🎁</p>
    <button onclick="mostrarMensaje()">Haz clic aquí 💌</button>
</div>

<script>
function mostrarMensaje() {
    alert("Belencita 💖 Que cada sonrisa tuya ilumine el mundo. Te mereces lo mejor hoy y siempre 🎂✨");
}

function crearCorazon() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 20 + 15 + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 6000);
}

setInterval(crearCorazon, 500);
</script>

</body>
</html>
